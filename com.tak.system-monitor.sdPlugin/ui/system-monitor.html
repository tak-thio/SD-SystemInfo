<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System Monitor Settings</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #e0e0e0;
        background-color: transparent;
        font-size: 13px;
        padding: 10px;
      }
      .info-box {
        background: #2a2a2a;
        border-radius: 6px;
        padding: 12px;
        line-height: 1.5;
        border: 1px solid #444;
      }
      .title {
        font-weight: 600;
        margin-bottom: 8px;
        color: #fff;
        font-size: 14px;
      }
      .note {
        margin-top: 8px;
        color: #888;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <div class="info-box">
      <div class="title">System Monitor Controls</div>
      <div>
        <strong>Dial rotate:</strong> Switch display mode<br />
        <strong>Dial press / Touch:</strong> Open Activity Monitor<br />
      </div>
      <div style="margin-top: 8px;">
        <strong>Modes:</strong><br />
        Combined &rarr; CPU only &rarr; RAM only
      </div>
      <div class="note">
        * Update interval is fixed at 3 seconds to preserve system performance.
      </div>
    </div>
  </body>
</html>
