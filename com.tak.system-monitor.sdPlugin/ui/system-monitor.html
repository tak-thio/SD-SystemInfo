<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System Monitor Settings</title>
    <link rel="stylesheet" href="https://sdpi-components.dev/css/sdpi.css" />
    <script src="https://sdpi-components.dev/js/sdpi-components.js"></script>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .sdpi-wrapper {
        padding: 8px 16px;
      }
      .sdpi-item > label {
        min-width: 80px;
      }
    </style>
  </head>
  <body>
    <sdpi-item label="Update Interval">
      <sdpi-select setting="updateInterval" placeholder="Select interval">
        <option value="1">1 second</option>
        <option value="2">2 seconds</option>
        <option value="3" selected>3 seconds (default)</option>
        <option value="5">5 seconds</option>
        <option value="10">10 seconds</option>
      </sdpi-select>
    </sdpi-item>

    <sdpi-item label="Info">
      <div style="font-size: 11px; color: #999; padding: 4px 0">
        <strong>Dial rotate:</strong> Switch display mode<br />
        <strong>Dial press / Touch:</strong> Open Activity Monitor<br />
        <br />
        <strong>Modes:</strong> Combined → CPU only → RAM only
      </div>
    </sdpi-item>
  </body>
</html>
